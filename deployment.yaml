apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-app
  labels:
    app: devsecops-app
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devsecops-app
      version: v1
  template:
    metadata:
      labels:
        app: devsecops-app
        version: v1
    spec:
      containers:
      - name: devsecops-app
        image: sandeepsardesi/devsecops-demo:v1
        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: devsecops-service
spec:
  type: NodePort
  selector:
    app: devsecops-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007
